{% extends "base.html" %}
{% block content %}

<h3>Edit DC</h3>

<form method="POST">
    <input type="text" name="dc_number" value="{{ d[1] }}" required class="form-control mb-2">
    <input type="text" name="customer_name" value="{{ d[2] }}" required class="form-control mb-2">
    <input type="date" name="dc_date" value="{{ d[3] }}" class="form-control mb-2">
    <button type="submit" class="btn btn-success">Update</button>
</form>

{% endblock %}
