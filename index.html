<!DOCTYPE html>

    <meta charset="UTF-8">

    <style>

</head>

                                </div>

                                    <input id="search-dc-date" type="date" onchange="renderTransactionFeed()" class="w-full h-11 pl-10 pr-4 bg-white rounded-xl text-sm border-none outline-none shadow-sm">

                    <!-- Tab: Master -->
                    <div id="tab-master" class="tab-content space-y-6">
                        <div class="bg-slate-900 p-8 rounded-3xl text-white shadow-2xl border border-slate-800">

                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                <input id="m-name" type="text" placeholder="Product Name" class="bg-white/10 border border-white/20 rounded-xl px-5 py-4 text-white outline-none">
                                <input id="m-size" type="text" placeholder="Size/Spec" class="bg-white/10 border border-white/20 rounded-xl px-5 py-4 text-white outline-none">
                                <select id="m-category" class="bg-white/10 border border-white/20 rounded-xl px-5 py-4 text-white outline-none">
                                    <option value="Raw" class="text-slate-900">Raw Inventory</option>
                                    <option value="Misc" class="text-slate-900">Miscellaneous</option>

    <!-- FIREBASE AND AUTH LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // IMPORTANT: Verify these settings in your Firebase Console Settings
        const firebaseConfig = {
            apiKey: "AIzaSyAGNyeShR7oeXKoacQ0GV6rGLQ3i0cR8Fg",
            authDomain: "erpsystem-aeed4.firebaseapp.com",
            projectId: "erpsystem-aeed4",
            storageBucket: "erpsystem-aeed4.firebasestorage.app",
            messagingSenderId: "936176090407",
            appId: "1:936176090407:web:52ac3396ba22a7dd43fd02"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Exponential backoff retry wrapper for login
        async function attemptLogin(email, password, retries = 5, delay = 1000) {
            try {
                return await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                if (retries > 0 && (error.code === 'auth/network-request-failed' || error.code === 'auth/internal-error')) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return attemptLogin(email, password, retries - 1, delay * 2);
                }
                throw error;
            }
        }

        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const errBox = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');

            errBox.classList.add('hidden');
            btn.innerText = "Authenticating...";
            btn.disabled = true;

            try {
                await attemptLogin(email, pass);
            } catch (error) {
                console.error("Login Error:", error.code, error.message);
                errBox.classList.remove('hidden');
                
                if (error.code === 'auth/invalid-credential') {
                    errBox.innerText = "Invalid email or password.";
                } else if (error.code === 'auth/user-not-found') {
                    errBox.innerText = "No account found with this email.";
                } else if (error.code === 'auth/wrong-password') {
                    errBox.innerText = "Incorrect password.";
                } else if (error.code === 'auth/too-many-requests') {
                    errBox.innerText = "Too many attempts. Try again later.";
                } else {
                    errBox.innerText = "Authentication failed. Please check your credentials.";
                }
                
                btn.innerText = "Sign In to Portal";
                btn.disabled = false;
            }
        };

        window.handleLogout = () => {
            signOut(auth).then(() => {
                location.reload();
            });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-container').classList.remove('hidden');
                renderAll();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-container').classList.add('hidden');
            }
        });
    </script>

    <!-- ERP SYSTEM LOGIC -->
    <script>
        let masterProducts = [
            { id: 1, name: 'Cement Ultra', size: '50kg', category: 'Raw' }
        ];

        let dcEntries = [];
        let currentTab = 'products';
        let currentSubTab = 'raw';
        let currentDcSubTab = 'inward';
        let batchItems = []; 
        let activeReduceItem = null;
        let currentImageBase64 = null;

        window.addEventListener('load', () => {
            const dateInput = document.getElementById('dc-date');
            if(dateInput) dateInput.value = new Date().toISOString().split('T')[0];
            document.getElementById('header-date').innerText = new Date().toLocaleDateString('en-GB', { dateStyle: 'medium' });
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });

        // MODAL FUNCTIONS
        function openModal(imgSrc, label) {
            const modal = document.getElementById('image-modal');
            const img = document.getElementById('modal-img');
            const lbl = document.getElementById('modal-label');
            img.src = imgSrc;
            lbl.innerText = label;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.querySelectorAll('.nav-btn, .mobile-nav-btn').forEach(b => b.classList.remove('nav-active', 'mobile-nav-active'));
            document.getElementById(`btn-${tabId}`)?.classList.add('nav-active');
            document.getElementById(`m-btn-${tabId}`)?.classList.add('mobile-nav-active');
            document.getElementById('current-tab-label').innerText = tabId.replace('_', ' ');
            closeReducePanel();
            renderAll();
        }

        function switchSubTab(sub) {
            currentSubTab = sub;
            document.querySelectorAll('.sub-nav-btn').forEach(b => b.classList.remove('sub-nav-active'));
            document.getElementById(`sub-btn-${sub}`).classList.add('sub-nav-active');
            const addMiscPanel = document.getElementById('add-misc-panel');
            const thDc = document.getElementById('th-dc');
            if (sub === 'misc') {
                addMiscPanel.classList.remove('hidden');
                thDc.innerText = 'Item Group';
            } else {
                addMiscPanel.classList.add('hidden');
                thDc.innerText = 'Ref DC';
            }
            closeReducePanel();
            renderInventory();
        }

        function switchDcSubTab(sub) {
            currentDcSubTab = sub;
            document.querySelectorAll('.dc-sub-nav-btn').forEach(b => b.classList.remove('sub-nav-active'));
            document.getElementById(`dc-sub-btn-${sub}`).classList.add('sub-nav-active');
            batchItems = [];
            renderDcEntryControls();
            renderBatchPreview();
        }

        function addMiscItem() {
            const name = document.getElementById('misc-name').value;
            const qty = Number(document.getElementById('misc-qty').value);
            if (!name || !qty) return;
            dcEntries.unshift({ id: Date.now(), dcNumber: 'MISC-GROUP', actualDc: 'MISC', customer: 'Direct Entry', date: new Date().toISOString().split('T')[0], type: 'IN', productName: name, size: 'Misc', quantity: qty, category: 'Misc' });
            document.getElementById('misc-name').value = '';
            document.getElementById('misc-qty').value = '';
            renderAll();
        }

        function getInventoryBalances() {
            const stockMap = {};
            dcEntries.forEach(entry => {
                const key = `${entry.productName}|${entry.size}|${entry.dcNumber}`;
                if (!stockMap[key]) stockMap[key] = { key, name: entry.productName, size: entry.size, dcNo: entry.dcNumber, category: entry.category, stock: 0 };
                stockMap[key].stock += (entry.type === 'IN' ? entry.quantity : -entry.quantity);
            });
            return Object.values(stockMap).filter(s => s.stock > 0);
        }

        function openReducePanel(key) {
            const items = getInventoryBalances();
            activeReduceItem = items.find(i => i.key === key);
            if (!activeReduceItem) return;
            document.getElementById('reduce-subtitle').innerText = `${activeReduceItem.name} • Available: ${activeReduceItem.stock}`;
            document.getElementById('quick-reduce-panel').classList.remove('hidden');
            document.getElementById('red-qty').focus();
        }

        function closeReducePanel() {
            document.getElementById('quick-reduce-panel').classList.add('hidden');
            activeReduceItem = null;
        }

        function confirmReduction() {
            const qty = Number(document.getElementById('red-qty').value);
            const ref = document.getElementById('red-ref').value || 'Usage';
            if (!qty || !activeReduceItem) return;
            dcEntries.unshift({ id: Date.now(), dcNumber: activeReduceItem.dcNo, actualDc: ref, customer: 'Internal Consumption', date: new Date().toISOString().split('T')[0], type: 'OUT', productName: activeReduceItem.name, size: activeReduceItem.size, quantity: qty, category: activeReduceItem.category });
            closeReducePanel();
            renderAll();
        }

        function renderInventory() {
            const stocks = getInventoryBalances().filter(s => (currentSubTab === 'raw' && s.category === 'Raw') || (currentSubTab === 'misc' && s.category === 'Misc'));
            const body = document.getElementById('inventory-table-body');
            const empty = document.getElementById('empty-inventory');
            if (stocks.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                body.innerHTML = stocks.map(row => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <p class="font-black text-slate-800 text-sm uppercase">${row.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${row.category === 'Misc' ? 'Misc Item' : row.size}</p>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-2 py-0.5 bg-slate-100 rounded text-[10px] font-black text-slate-500 uppercase">${row.dcNo}</span>
                        </td>
                        <td class="px-6 py-4 text-right"><p class="font-black text-blue-600 text-base">${row.stock}</p></td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="openReducePanel('${row.key}')" class="bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all shadow-sm">Reduce</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function renderDcEntryControls() {
            const container = document.getElementById('dc-entry-controls');
            if (currentDcSubTab === 'inward') {
                document.getElementById('simple-outward-save').classList.add('hidden');
                container.innerHTML = `<div class="md:col-span-6"><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Product Name (Manual)</label><input id="dc-manual-name" type="text" placeholder="Enter Product Name" class="w-full h-11 rounded-xl px-4 text-sm outline-none bg-white"></div><div class="md:col-span-3"><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Size/Spec</label><input id="dc-manual-size" type="text" placeholder="e.g. 10mm" class="w-full h-11 rounded-xl px-4 text-sm outline-none bg-white"></div><div class="md:col-span-2"><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Qty</label><input id="dc-qty-input" type="number" placeholder="Qty" class="w-full h-11 rounded-xl px-4 text-sm outline-none bg-white"></div><div class="md:col-span-1 flex items-end"><button onclick="addItemToCurrentDc()" class="w-full h-11 bg-white text-slate-900 rounded-xl flex items-center justify-center transition-transform active:scale-95 shadow-lg"><i data-lucide="plus" size="20"></i></button></div>`;
            } else {
                container.innerHTML = `<div class="md:col-span-12 py-4"><p class="text-slate-400 text-xs font-bold uppercase tracking-widest text-center">Fill DC Info above to save Outward record</p></div>`;
                document.getElementById('simple-outward-save').classList.remove('hidden');
            }
            if(window.lucide) lucide.createIcons();
        }

        function addItemToCurrentDc() {
            const name = document.getElementById('dc-manual-name').value;
            const size = document.getElementById('dc-manual-size').value || 'N/A';
            const qty = Number(document.getElementById('dc-qty-input').value);
            if (!name || !qty) return;
            batchItems.push({ name, size, qty, category: 'Raw', sourceDc: null });
            renderBatchPreview();
            document.getElementById('dc-manual-name').value = '';
            document.getElementById('dc-manual-size').value = '';
            document.getElementById('dc-qty-input').value = '';
        }

        function renderBatchPreview() {
            const container = document.getElementById('dc-items-preview');
            const saveBtn = document.getElementById('final-save-btn');
            if (batchItems.length === 0) { container.innerHTML = ''; saveBtn.classList.add('hidden'); return; }
            saveBtn.classList.remove('hidden');
            container.innerHTML = batchItems.map((item, idx) => `
                <div class="flex items-center justify-between bg-slate-800 p-4 rounded-2xl text-white">
                    <div><p class="font-black text-sm uppercase">${item.name}</p><p class="text-[9px] text-slate-400 font-bold uppercase">${item.size}</p></div>
                    <div class="flex items-center gap-4"><p class="font-black text-lg text-blue-400">${item.qty}</p><button onclick="batchItems.splice(${idx},1);renderBatchPreview()" class="text-rose-500"><i data-lucide="trash-2" size="16"></i></button></div>
                </div>
            `).join('');
            if(window.lucide) lucide.createIcons();
        }

        function saveFullDC() {
            const ref = document.getElementById('dc-ref').value;
            const client = document.getElementById('dc-client').value;
            const date = document.getElementById('dc-date').value;
            if (!ref || !client) return alert("Missing Info");
            if (currentDcSubTab === 'inward') {
                batchItems.forEach(item => {
                    dcEntries.unshift({ id: Date.now() + Math.random(), dcNumber: ref, actualDc: ref, customer: client, date, type: 'IN', productName: item.name, size: item.size, quantity: item.qty, category: item.category, image: currentImageBase64 });
                });
            } else {
                dcEntries.unshift({ id: Date.now(), dcNumber: ref, actualDc: ref, customer: client, date, type: 'OUT', productName: 'Outward shipment', size: 'Bulk', quantity: 0, category: 'Outward', image: currentImageBase64 });
            }
            batchItems = [];
            currentImageBase64 = null;
            document.getElementById('dc-ref').value = '';
            document.getElementById('dc-client').value = '';
            document.getElementById('img-status').innerText = "Add Photo";
            renderAll();
            renderBatchPreview();
        }

        function renderTransactionFeed() {
            const container = document.getElementById('transaction-feed');
            const searchNo = document.getElementById('search-dc-no').value.toLowerCase();
            const searchDate = document.getElementById('search-dc-date').value;
            const seen = new Set();
            const filtered = dcEntries.filter(e => {
                const dcNo = (e.actualDc || e.dcNumber).toLowerCase();
                const matchesNo = !searchNo || dcNo.includes(searchNo);
                const matchesDate = !searchDate || e.date === searchDate;
                if (matchesNo && matchesDate) {
                    const id = e.actualDc || e.dcNumber;
                    if (seen.has(id)) return false;
                    seen.add(id);
                    return true;
                }
                return false;
            });
            container.innerHTML = filtered.map(entry => {
                // View button logic: Only show if an image exists
                const viewBtn = entry.image ? `
                    <button onclick="openModal('${entry.image}', '${entry.actualDc || entry.dcNumber}')" class="w-10 h-10 flex items-center justify-center text-blue-500 hover:bg-blue-50 rounded-xl transition-colors">
                        <i data-lucide="eye"></i>
                    </button>
                ` : '';

                return `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center ${entry.type === 'IN' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}"><i data-lucide="${entry.type === 'IN' ? 'download' : 'upload'}" size="20"></i></div>
                        <div><p class="font-black text-blue-600 text-lg uppercase leading-none">${entry.actualDc || entry.dcNumber}</p><p class="text-[9px] text-slate-400 font-bold uppercase mt-1">${entry.date} • ${entry.customer}</p></div>
                    </div>
                    <div class="flex items-center gap-1">
                        ${viewBtn}
                        <button onclick="dcEntries=dcEntries.filter(e => (e.actualDc||e.dcNumber) !== '${entry.actualDc||entry.dcNumber}');renderAll();" class="w-10 h-10 flex items-center justify-center text-slate-200 hover:text-rose-500 transition-colors"><i data-lucide="trash-2"></i></button>
                    </div>
                </div>
            `}).join('');
            if(window.lucide) lucide.createIcons();
        }

        function handleImagePreview(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImageBase64 = ev.target.result;
                document.getElementById('img-status').innerText = "Photo Ready";
            };
            reader.readAsDataURL(file);
        }

        function handleMasterAdd() {
            const name = document.getElementById('m-name').value;
            const size = document.getElementById('m-size').value;
            const category = document.getElementById('m-category').value;
            if(!name) return;
            masterProducts.push({ id: Date.now(), name, size, category });
            renderAll();
        }

        function renderMaster() {
            const container = document.getElementById('master-grid');
            if(!container) return;
            container.innerHTML = masterProducts.map(p => `
                <div class="bg-white p-4 rounded-2xl border border-slate-200 flex items-center justify-between">
                    <div><p class="font-black text-slate-800 text-xs uppercase">${p.name}</p><p class="text-[9px] font-black text-slate-400 uppercase">${p.size} • ${p.category}</p></div>
                    <button onclick="masterProducts=masterProducts.filter(i=>i.id!==${p.id});renderAll();" class="text-slate-200 hover:text-rose-500"><i data-lucide="trash-2"></i></button>
                </div>
            `).join('');
            if(window.lucide) lucide.createIcons();
        }

        function renderAll() {
            renderMaster();
            renderInventory();
            renderTransactionFeed();
            if (currentTab === 'dc_entry') renderDcEntryControls();
        }
    </script>
</body>
</html>
