<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Friendly ERP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .nav-active { background-color: #2563eb !important; color: white !important; }
        .mobile-nav-active { color: #2563eb !important; border-top: 2px solid #2563eb; }
        
        .sub-nav-active { 
            background-color: #0f172a !important; 
            color: #ffffff !important; 
        }

        [data-lucide] { width: 18px; height: 18px; }
        
        #image-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20 md:pb-0">

    <div id="image-modal" onclick="closeModal()">
        <div class="relative max-w-4xl w-full h-full flex flex-col items-center justify-center gap-4">
            <button class="absolute top-4 right-4 text-white bg-white/20 p-2 rounded-full"><i data-lucide="x"></i></button>
            <img id="modal-img" src="" class="max-h-[80vh] w-auto rounded-lg shadow-2xl object-contain">
            <p id="modal-label" class="text-white font-black uppercase tracking-widest text-sm"></p>
        </div>
    </div>

    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- Desktop Sidebar -->
        <aside class="w-64 bg-slate-900 text-white hidden md:flex flex-col shadow-xl">
            <div class="p-6 border-b border-slate-800 flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="package" size="24"></i></div>
                <h1 class="text-xl font-bold tracking-tight">ERP System</h1>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchTab('products')" id="btn-products" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 transition-all">
                    <i data-lucide="layout-dashboard"></i><span class="font-medium">Inventory</span>
                </button>
                <button onclick="switchTab('dc_entry')" id="btn-dc_entry" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 transition-all">
                    <i data-lucide="file-text"></i><span class="font-medium">DC Entry</span>
                </button>
                <button onclick="switchTab('master')" id="btn-master" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 transition-all">
                    <i data-lucide="settings"></i><span class="font-medium">Master</span>
                </button>
            </nav>
        </aside>

        <!-- Mobile Bottom Nav -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center md:hidden z-50">
            <button onclick="switchTab('products')" id="m-btn-products" class="mobile-nav-btn flex flex-col items-center py-3 px-6 text-slate-400">
                <i data-lucide="layout-dashboard"></i><span class="text-[10px] font-bold uppercase mt-1">Inventory</span>
            </button>
            <button onclick="switchTab('dc_entry')" id="m-btn-dc_entry" class="mobile-nav-btn flex flex-col items-center py-3 px-6 text-slate-400">
                <i data-lucide="file-text"></i><span class="text-[10px] font-bold uppercase mt-1">DC Entry</span>
            </button>
            <button onclick="switchTab('master')" id="m-btn-master" class="mobile-nav-btn flex flex-col items-center py-3 px-6 text-slate-400">
                <i data-lucide="settings"></i><span class="text-[10px] font-bold uppercase mt-1">Master</span>
            </button>
        </nav>

        <main class="flex-1 flex flex-col overflow-auto">
            <header class="bg-white border-b border-slate-200 px-4 md:px-8 py-4 sticky top-0 z-40 shadow-sm flex justify-between items-center">
                <h2 id="current-tab-label" class="text-xl font-black text-slate-800 uppercase tracking-tight">Inventory</h2>
                <div id="header-date" class="hidden sm:block text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full"></div>
            </header>

            <div class="p-4 md:p-8 max-w-7xl mx-auto w-full space-y-6">
                
                <!-- Tab: Inventory -->
                <div id="tab-products" class="tab-content active space-y-6">
                    <div class="flex p-1 bg-slate-200 rounded-xl w-fit">
                        <button onclick="switchSubTab('raw')" id="sub-btn-raw" class="sub-nav-btn px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">Raw Inventory</button>
                        <button onclick="switchSubTab('misc')" id="sub-btn-misc" class="sub-nav-btn px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">Miscellaneous</button>
                    </div>

                    <!-- Add Misc Item Box (Quick Entry) -->
                    <div id="add-misc-panel" class="hidden bg-slate-900 p-6 rounded-3xl shadow-xl space-y-4">
                        <h3 class="text-white font-black uppercase text-xs tracking-widest">Add Miscellaneous Item</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <input id="misc-name" type="text" placeholder="Item Name" class="h-11 rounded-xl px-4 text-sm outline-none bg-white">
                            <input id="misc-qty" type="number" placeholder="Initial Qty" class="h-11 rounded-xl px-4 text-sm outline-none bg-white">
                            <button onclick="addMiscItem()" class="h-11 bg-blue-600 text-white rounded-xl font-black uppercase text-xs shadow-lg transition-transform active:scale-95">Add to Stock</button>
                        </div>
                    </div>

                    <!-- Quick Reduce Panel -->
                    <div id="quick-reduce-panel" class="hidden bg-rose-600 p-6 rounded-3xl shadow-xl space-y-4 animate-in fade-in slide-in-from-top-4 duration-300">
                        <div class="flex justify-between items-center border-b border-rose-500 pb-3">
                            <div>
                                <h3 id="reduce-title" class="text-white font-black uppercase text-sm">Reduce Stock</h3>
                                <p id="reduce-subtitle" class="text-rose-200 text-[10px] font-bold uppercase"></p>
                            </div>
                            <button onclick="closeReducePanel()" class="text-white"><i data-lucide="x"></i></button>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <input id="red-qty" type="number" placeholder="Qty to Remove" class="h-11 rounded-xl px-4 text-sm outline-none bg-white">
                            <input id="red-ref" type="text" placeholder="Reference / Purpose" class="h-11 rounded-xl px-4 text-sm outline-none bg-white">
                            <button onclick="confirmReduction()" class="h-11 bg-slate-900 text-white rounded-xl font-black uppercase text-xs shadow-lg transition-transform active:scale-95">Confirm Update</button>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 border-b border-slate-100">
                                    <tr>
                                        <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Product Info</th>
                                        <th id="th-dc" class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Ref DC</th>
                                        <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Balance</th>
                                        <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="inventory-table-body" class="divide-y divide-slate-50"></tbody>
                            </table>
                            <div id="empty-inventory" class="hidden p-16 text-center text-slate-300 font-bold uppercase text-xs tracking-[0.2em]">Zero Stock Available</div>
                        </div>
                    </div>
                </div>

                <!-- Tab: DC Entry -->
                <div id="tab-dc_entry" class="tab-content space-y-6">
                    <div class="flex flex-wrap gap-2 p-1 bg-slate-200 rounded-xl w-fit">
                        <button onclick="switchDcSubTab('inward')" id="dc-sub-btn-inward" class="dc-sub-nav-btn px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">Inward Entry</button>
                        <button onclick="switchDcSubTab('outward')" id="dc-sub-btn-outward" class="dc-sub-nav-btn px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all">Outward Entry</button>
                    </div>

                    <!-- DC General Info -->
                    <div class="space-y-4">
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">DC Date</label>
                                <input id="dc-date" type="date" class="w-full h-11 border border-slate-200 bg-slate-50 rounded-xl px-4 text-sm outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">DC Number</label>
                                <input id="dc-ref" type="text" placeholder="REF#" class="w-full h-11 border border-slate-200 bg-slate-50 rounded-xl px-4 text-sm outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">Party Name</label>
                                <input id="dc-client" type="text" placeholder="Client Name" class="w-full h-11 border border-slate-200 bg-slate-50 rounded-xl px-4 text-sm outline-none">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-400 uppercase">DC Document</label>
                                <input type="file" id="dc-image-input" class="hidden" onchange="handleImagePreview(event)">
                                <button onclick="document.getElementById('dc-image-input').click()" id="img-upload-btn" class="w-full h-11 bg-slate-100 border border-slate-200 rounded-xl flex items-center justify-center gap-2 text-[10px] font-black uppercase text-slate-600">
                                    <i data-lucide="camera" size="16"></i> <span id="img-status">Add Photo</span>
                                </button>
                            </div>
                        </div>

                        <!-- Item Entry Area -->
                        <div id="item-entry-section" class="bg-slate-900 p-6 rounded-3xl shadow-xl space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-12 gap-3" id="dc-entry-controls"></div>
                            <div id="dc-items-preview" class="space-y-2 pt-2 border-t border-slate-800"></div>
                            <button id="final-save-btn" onclick="saveFullDC()" class="hidden w-full h-14 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-[0.2em] text-xs shadow-2xl transition-all">
                                Save DC Record
                            </button>
                            <!-- Special save button for simple outward where no items are added to list -->
                            <button id="simple-outward-save" onclick="saveFullDC()" class="hidden w-full h-14 bg-emerald-600 text-white rounded-2xl font-black uppercase tracking-[0.2em] text-xs shadow-2xl transition-all">
                                Submit Outward DC
                            </button>
                        </div>
                    </div>

                    <!-- Search and History Section -->
                    <div class="space-y-4">
                        <div class="bg-slate-100 p-4 rounded-2xl border border-slate-200 grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="relative">
                                <i data-lucide="search" class="absolute left-3 top-3.5 text-slate-400" size="18"></i>
                                <input id="search-dc-no" type="text" onkeyup="renderTransactionFeed()" placeholder="Search DC Number..." class="w-full h-11 pl-10 pr-4 bg-white rounded-xl text-sm border-none outline-none shadow-sm">
                            </div>
                            <div class="relative">
                                <i data-lucide="calendar-search" class="absolute left-3 top-3.5 text-slate-400" size="18"></i>
                                <input id="search-dc-date" type="date" onchange="renderTransactionFeed()" class="w-full h-11 pl-10 pr-4 bg-white rounded-xl text-sm border-none outline-none shadow-sm">
                            </div>
                        </div>
                        <div id="transaction-feed" class="space-y-3"></div>
                    </div>
                </div>

                <!-- Tab: Master -->
                <div id="tab-master" class="tab-content space-y-6">
                    <div class="bg-slate-900 p-8 rounded-3xl text-white shadow-2xl border border-slate-800">
                        <h3 class="text-xl font-black mb-6 uppercase">Master Product List</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <input id="m-name" type="text" placeholder="Product Name" class="bg-white/10 border border-white/20 rounded-xl px-5 py-4 text-white outline-none">
                            <input id="m-size" type="text" placeholder="Size/Spec" class="bg-white/10 border border-white/20 rounded-xl px-5 py-4 text-white outline-none">
                            <select id="m-category" class="bg-white/10 border border-white/20 rounded-xl px-5 py-4 text-white outline-none">
                                <option value="Raw" class="text-slate-900">Raw Inventory</option>
                                <option value="Misc" class="text-slate-900">Miscellaneous</option>
                            </select>
                            <button onclick="handleMasterAdd()" class="sm:col-span-3 bg-blue-600 p-5 rounded-xl font-black uppercase tracking-widest text-xs">Add Product to Master</button>
                        </div>
                    </div>
                    <div id="master-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let masterProducts = [
            { id: 1, name: 'Cement Ultra', size: '50kg', category: 'Raw' },
            { id: 2, name: 'Steel Rods', size: '10mm', category: 'Raw' }
        ];

        let dcEntries = [];
        let currentTab = 'products';
        let currentSubTab = 'raw';
        let currentDcSubTab = 'inward';
        let batchItems = []; 
        let activeReduceItem = null;
        let currentImageBase64 = null;

        window.addEventListener('load', () => {
            document.getElementById('dc-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('header-date').innerText = new Date().toLocaleDateString('en-GB', { dateStyle: 'medium' });
            renderAll();
            switchTab('products');
            switchSubTab('raw');
        });

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            document.querySelectorAll('.nav-btn, .mobile-nav-btn').forEach(b => b.classList.remove('nav-active', 'mobile-nav-active'));
            document.getElementById(`btn-${tabId}`)?.classList.add('nav-active');
            document.getElementById(`m-btn-${tabId}`)?.classList.add('mobile-nav-active');
            
            document.getElementById('current-tab-label').innerText = tabId.replace('_', ' ');
            closeReducePanel();
            renderAll();
        }

        function switchSubTab(sub) {
            currentSubTab = sub;
            document.querySelectorAll('.sub-nav-btn').forEach(b => b.classList.remove('sub-nav-active'));
            document.getElementById(`sub-btn-${sub}`).classList.add('sub-nav-active');
            
            const addMiscPanel = document.getElementById('add-misc-panel');
            const thDc = document.getElementById('th-dc');
            
            if (sub === 'misc') {
                addMiscPanel.classList.remove('hidden');
                thDc.innerText = 'Item Group';
            } else {
                addMiscPanel.classList.add('hidden');
                thDc.innerText = 'Ref DC';
            }

            closeReducePanel();
            renderInventory();
        }

        function switchDcSubTab(sub) {
            currentDcSubTab = sub;
            document.querySelectorAll('.dc-sub-nav-btn').forEach(b => b.classList.remove('sub-nav-active'));
            document.getElementById(`dc-sub-btn-${sub}`).classList.add('sub-nav-active');
            batchItems = []; // Clear current list on switch
            renderDcEntryControls();
            renderBatchPreview();
        }

        function addMiscItem() {
            const name = document.getElementById('misc-name').value;
            const qty = Number(document.getElementById('misc-qty').value);
            if (!name || !qty) return;

            dcEntries.unshift({
                id: Date.now(),
                dcNumber: 'MISC-GROUP',
                actualDc: 'MISC',
                customer: 'Direct Entry',
                date: new Date().toISOString().split('T')[0],
                type: 'IN',
                productName: name,
                size: 'Misc',
                quantity: qty,
                category: 'Misc'
            });

            document.getElementById('misc-name').value = '';
            document.getElementById('misc-qty').value = '';
            renderAll();
        }

        function getInventoryBalances() {
            const stockMap = {};
            dcEntries.forEach(entry => {
                const key = `${entry.productName}|${entry.size}|${entry.dcNumber}`;
                if (!stockMap[key]) {
                    stockMap[key] = { 
                        key, 
                        name: entry.productName, 
                        size: entry.size, 
                        dcNo: entry.dcNumber, 
                        category: entry.category,
                        stock: 0 
                    };
                }
                stockMap[key].stock += (entry.type === 'IN' ? entry.quantity : -entry.quantity);
            });
            return Object.values(stockMap).filter(s => s.stock > 0);
        }

        function openReducePanel(key) {
            const items = getInventoryBalances();
            activeReduceItem = items.find(i => i.key === key);
            if (!activeReduceItem) return;

            document.getElementById('reduce-subtitle').innerText = `${activeReduceItem.name} • Available: ${activeReduceItem.stock}`;
            document.getElementById('quick-reduce-panel').classList.remove('hidden');
            document.getElementById('red-qty').focus();
        }

        function closeReducePanel() {
            document.getElementById('quick-reduce-panel').classList.add('hidden');
            activeReduceItem = null;
            document.getElementById('red-qty').value = '';
            document.getElementById('red-ref').value = '';
        }

        function confirmReduction() {
            const qty = Number(document.getElementById('red-qty').value);
            const ref = document.getElementById('red-ref').value || 'Usage';
            if (!qty || !activeReduceItem) return;
            if (qty > activeReduceItem.stock) {
                alert("Cannot reduce more than available balance!");
                return;
            }

            dcEntries.unshift({
                id: Date.now(),
                dcNumber: activeReduceItem.dcNo,
                actualDc: ref,
                customer: 'Internal Consumption',
                date: new Date().toISOString().split('T')[0],
                type: 'OUT',
                productName: activeReduceItem.name,
                size: activeReduceItem.size,
                quantity: qty,
                category: activeReduceItem.category
            });

            closeReducePanel();
            renderAll();
        }

        function renderInventory() {
            const stocks = getInventoryBalances().filter(s => 
                (currentSubTab === 'raw' && s.category === 'Raw') || 
                (currentSubTab === 'misc' && s.category === 'Misc')
            );
            
            const body = document.getElementById('inventory-table-body');
            const empty = document.getElementById('empty-inventory');
            
            if (stocks.length === 0) {
                body.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                body.innerHTML = stocks.map(row => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <p class="font-black text-slate-800 text-sm uppercase">${row.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">${row.category === 'Misc' ? 'Misc Item' : row.size}</p>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="px-2 py-0.5 bg-slate-100 rounded text-[10px] font-black text-slate-500 uppercase">${row.dcNo}</span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <p class="font-black text-blue-600 text-base">${row.stock}</p>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="openReducePanel('${row.key}')" class="bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white px-3 py-1.5 rounded-lg text-[10px] font-black uppercase transition-all shadow-sm active:scale-95">Reduce</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function renderDcEntryControls() {
            const container = document.getElementById('dc-entry-controls');
            
            if (currentDcSubTab === 'inward') {
                document.getElementById('simple-outward-save').classList.add('hidden');
                container.innerHTML = `
                    <div class="md:col-span-6">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Product Name (Manual)</label>
                        <input id="dc-manual-name" type="text" placeholder="Enter Product Name" class="w-full h-11 rounded-xl px-4 text-sm outline-none bg-white">
                    </div>
                    <div class="md:col-span-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Size/Spec</label>
                        <input id="dc-manual-size" type="text" placeholder="e.g. 10mm" class="w-full h-11 rounded-xl px-4 text-sm outline-none bg-white">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Qty</label>
                        <input id="dc-qty-input" type="number" placeholder="Qty" class="w-full h-11 rounded-xl px-4 text-sm outline-none bg-white">
                    </div>
                    <div class="md:col-span-1 flex items-end">
                        <button onclick="addItemToCurrentDc()" class="w-full h-11 bg-white text-slate-900 rounded-xl flex items-center justify-center transition-transform active:scale-95 shadow-lg">
                            <i data-lucide="plus" size="20"></i>
                        </button>
                    </div>
                `;
            } else {
                // Outward Entry (Simplified - No Stock Selection)
                container.innerHTML = `
                    <div class="md:col-span-12 py-4">
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest text-center">Fill DC Info above to save Outward record</p>
                    </div>
                `;
                document.getElementById('simple-outward-save').classList.remove('hidden');
            }
            lucide.createIcons();
        }

        function addItemToCurrentDc() {
            const name = document.getElementById('dc-manual-name').value;
            const size = document.getElementById('dc-manual-size').value || 'N/A';
            const qty = Number(document.getElementById('dc-qty-input').value);

            if (!name || !qty) return;

            batchItems.push({ name, size, qty, category: 'Raw', sourceDc: null });
            renderBatchPreview();
            
            // Clear inputs for next item
            document.getElementById('dc-manual-name').value = '';
            document.getElementById('dc-manual-size').value = '';
            document.getElementById('dc-qty-input').value = '';
            document.getElementById('dc-manual-name').focus();
        }

        function renderBatchPreview() {
            const container = document.getElementById('dc-items-preview');
            const saveBtn = document.getElementById('final-save-btn');
            
            if (batchItems.length === 0) {
                container.innerHTML = '';
                saveBtn.classList.add('hidden');
                return;
            }
            
            saveBtn.classList.remove('hidden');
            container.innerHTML = batchItems.map((item, idx) => `
                <div class="flex items-center justify-between bg-slate-800 p-4 rounded-2xl text-white">
                    <div>
                        <p class="font-black text-sm uppercase">${item.name}</p>
                        <p class="text-[9px] text-slate-400 font-bold uppercase">${item.size}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="font-black text-lg text-blue-400">${item.qty}</p>
                        <button onclick="batchItems.splice(${idx},1);renderBatchPreview()" class="text-rose-500"><i data-lucide="trash-2" size="16"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function saveFullDC() {
            const ref = document.getElementById('dc-ref').value;
            const client = document.getElementById('dc-client').value;
            const date = document.getElementById('dc-date').value;
            
            if (!ref || !client) { 
                alert("Please enter DC Number and Party Name"); 
                return; 
            }

            if (currentDcSubTab === 'inward') {
                if (batchItems.length === 0) { alert("Add at least one item"); return; }
                
                batchItems.forEach(item => {
                    dcEntries.unshift({
                        id: Date.now() + Math.random(),
                        dcNumber: ref,
                        actualDc: ref,
                        customer: client,
                        date: date,
                        type: 'IN',
                        productName: item.name,
                        size: item.size,
                        quantity: item.qty,
                        category: item.category,
                        image: currentImageBase64
                    });
                });
            } else {
                // Simplified Outward Record (Documenting the action)
                dcEntries.unshift({
                    id: Date.now(),
                    dcNumber: ref,
                    actualDc: ref,
                    customer: client,
                    date: date,
                    type: 'OUT',
                    productName: 'Outward Shipment',
                    size: 'Bulk',
                    quantity: 0, // Recorded as 0 for simple tracking
                    category: 'Outward',
                    image: currentImageBase64
                });
            }

            // Cleanup
            batchItems = [];
            currentImageBase64 = null;
            document.getElementById('dc-ref').value = '';
            document.getElementById('dc-client').value = '';
            document.getElementById('img-status').innerText = "Add Photo";
            renderAll();
            renderBatchPreview();
        }

        function renderTransactionFeed() {
            const container = document.getElementById('transaction-feed');
            const searchNo = document.getElementById('search-dc-no').value.toLowerCase();
            const searchDate = document.getElementById('search-dc-date').value;

            // Group by actual DC to show transaction cards
            const seen = new Set();
            const filtered = dcEntries.filter(e => {
                const dcNo = (e.actualDc || e.dcNumber).toLowerCase();
                const matchesNo = !searchNo || dcNo.includes(searchNo);
                const matchesDate = !searchDate || e.date === searchDate;
                
                if (matchesNo && matchesDate) {
                    const id = e.actualDc || e.dcNumber;
                    if (seen.has(id)) return false;
                    seen.add(id);
                    return true;
                }
                return false;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<p class="p-8 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest">No matching records</p>`;
                return;
            }

            container.innerHTML = `<h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2 mb-2">History List</h4>` + 
            filtered.map(entry => `
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center ${entry.type === 'IN' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">
                            <i data-lucide="${entry.type === 'IN' ? 'download' : 'upload'}" size="20"></i>
                        </div>
                        <div>
                            <p class="font-black text-blue-600 text-lg uppercase leading-none">${entry.actualDc || entry.dcNumber}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase mt-1">${entry.date} • ${entry.customer}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        ${entry.image ? `<button onclick="viewDcImage('${entry.dcNumber}', '${entry.image}')" class="w-10 h-10 flex items-center justify-center text-slate-400 bg-slate-50 rounded-lg hover:text-blue-600 transition-colors"><i data-lucide="image"></i></button>` : ''}
                        <button onclick="dcEntries=dcEntries.filter(e => (e.actualDc||e.dcNumber) !== '${entry.actualDc||entry.dcNumber}');renderAll();" class="w-10 h-10 flex items-center justify-center text-slate-200 hover:text-rose-500 transition-colors">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function handleImagePreview(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImageBase64 = ev.target.result;
                document.getElementById('img-status').innerText = "Photo Ready";
            };
            reader.readAsDataURL(file);
        }

        function handleMasterAdd() {
            const name = document.getElementById('m-name').value;
            const size = document.getElementById('m-size').value;
            const category = document.getElementById('m-category').value;
            if(!name) return;
            masterProducts.push({ id: Date.now(), name, size, category });
            renderAll();
            document.getElementById('m-name').value = '';
            document.getElementById('m-size').value = '';
        }

        function renderMaster() {
            const container = document.getElementById('master-grid');
            container.innerHTML = masterProducts.map(p => `
                <div class="bg-white p-4 rounded-2xl border border-slate-200 flex items-center justify-between">
                    <div>
                        <p class="font-black text-slate-800 text-xs uppercase">${p.name}</p>
                        <p class="text-[9px] font-black text-slate-400 uppercase">${p.size} • ${p.category}</p>
                    </div>
                    <button onclick="masterProducts=masterProducts.filter(i=>i.id!==${p.id});renderAll();" class="text-slate-200 hover:text-rose-500"><i data-lucide="trash-2"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function viewDcImage(no, img) {
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-label').innerText = "Ref: " + no;
            document.getElementById('image-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('image-modal').style.display = 'none'; }

        function renderAll() {
            renderMaster();
            renderInventory();
            renderTransactionFeed();
            if (currentTab === 'dc_entry') renderDcEntryControls();
        }
    </script>
</body>
</html>
