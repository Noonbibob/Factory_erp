{% extends "base.html" %}
{% block content %}

<h3>Delivery Challan (DC)</h3>

<h5>Search DC</h5>
<form method="GET" class="mb-3">
    <input type="text" name="search_number" placeholder="DC Number">
    <input type="date" name="search_date">
    <button type="submit" class="btn btn-primary">Search</button>
</form>

<form method="POST" enctype="multipart/form-data" class="mb-4">
    <input type="text" name="dc_number" placeholder="DC Number" required>
    <input type="text" name="customer_name" placeholder="Customer Name" required>
    <input type="date" name="dc_date" value="{{ current_date }}">
    <input type="file" name="image">
    <button type="submit" class="btn btn-success">Save DC</button>
    <select name="dc_type" required>
        <option value="IN">IN</option>
        <option value="OUT">OUT</option>
    </select>
</form>

<table class="table table-bordered">
<tr>
<th>ID</th>
<th>DC Number</th>
<th>Customer</th>
<th>Date</th>
<th>Image</th>
<th>Edit</th>
<th>Type</th>
</tr>

{% for d in dc %}
<tr>
<td>{{ d[0] }}</td>
<td>{{ d[1] }}</td>
<td>{{ d[2] }}</td>
<td>{{ d[3] }}</td>
<td>{{ d[4] }}</td>
<td>
{% if d[4] %}
<a href="/{{ d[4] }}" target="_blank">View</a>
{% else %}-{% endif %}
</td>
<td>
<a href="/edit_dc/{{ d[0] }}" class="btn btn-sm btn-warning">Edit</a>
</td>
</tr>
{% endfor %}
</table>

{% endblock %}
